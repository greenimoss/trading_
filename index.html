<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트레이딩 R/R 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0f11;color:#e8eaed;font-family:'Noto Sans KR',sans-serif;min-height:100vh}
.page{max-width:680px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
h1{font-size:1.1rem;font-weight:500;margin-bottom:4px}
.sub{font-size:0.8rem;color:#5c6470;margin-bottom:2rem}
.card{background:#161a1f;border:0.5px solid #2a2f36;border-radius:14px;padding:1.5rem;margin-bottom:1rem}
.label{font-size:0.7rem;font-weight:500;color:#5c6470;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:0.72rem;color:#7a8290;font-weight:500}
.field input{height:40px;background:#0d0f11;border:0.5px solid #2a2f36;border-radius:8px;padding:0 12px;font-size:0.9rem;font-family:'IBM Plex Mono',monospace;color:#e8eaed;outline:none;width:100%}
.field input:focus{border-color:#3a4250}
.field input::placeholder{color:#3a4250}
.upload-zone{border:1px dashed #2a2f36;border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:0.15s}
.upload-zone:hover{border-color:#3a4250;background:#1a1e24}
.upload-icon{font-size:1.5rem;margin-bottom:6px}
.upload-text{font-size:0.8rem;color:#7a8290}
.upload-sub{font-size:0.7rem;color:#3a4250;margin-top:3px}
#preview{width:100%;border-radius:8px;margin-top:12px;max-height:220px;object-fit:contain;display:none}
.remove-btn{font-size:0.75rem;color:#5c6470;background:none;border:none;cursor:pointer;margin-top:6px;float:right}
.btn{width:100%;height:44px;border-radius:10px;border:none;background:#e8eaed;color:#0d0f11;font-size:0.9rem;font-weight:500;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:opacity 0.15s;margin-top:10px}
.btn:hover{opacity:0.88}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px}
.metric{background:#0d0f11;border-radius:8px;padding:10px 12px;border:0.5px solid #2a2f36}
.metric-label{font-size:0.68rem;color:#5c6470;font-weight:500;margin-bottom:5px}
.metric-value{font-size:1.05rem;font-weight:500;font-family:'IBM Plex Mono',monospace}
.bar-wrap{margin:8px 0 14px}
.bar-labels{display:flex;justify-content:space-between;font-size:0.68rem;color:#5c6470;margin-bottom:5px}
.bar-track{height:4px;background:#2a2f36;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 0.4s,background 0.4s}
.verdict{border-radius:10px;padding:1rem 1.25rem;border:0.5px solid #2a2f36;margin-bottom:10px}
.verdict-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.verdict-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.verdict-title{font-size:0.88rem;font-weight:500}
.verdict-body{font-size:0.8rem;color:#7a8290;line-height:1.65}
.ai-box{border:0.5px solid #2a2f36;border-radius:10px;overflow:hidden;margin-top:10px}
.ai-header{padding:10px 14px;background:#1a1e24;border-bottom:0.5px solid #2a2f36;display:flex;align-items:center;gap:8px}
.ai-badge{font-size:0.65rem;font-weight:500;background:#e8eaed;color:#0d0f11;padding:2px 7px;border-radius:99px}
.ai-title{font-size:0.82rem;font-weight:500}
.ai-body{padding:1rem 1.25rem}
.ai-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.ai-row-label{font-size:0.67rem;font-weight:500;color:#5c6470;min-width:52px;padding-top:1px;text-transform:uppercase;letter-spacing:0.06em}
.ai-row-val{font-size:0.8rem;color:#e8eaed;line-height:1.5}
.ai-advice{margin-top:10px;padding-top:10px;border-top:0.5px solid #2a2f36;font-size:0.82rem;color:#e8eaed;line-height:1.65}
.dots{display:inline-flex;gap:4px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:#5c6470;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.error-msg{font-size:0.8rem;color:#E24B4A;padding:10px 0}
.tag{display:inline-block;font-size:0.68rem;font-weight:500;padding:2px 8px;border-radius:99px;font-family:'IBM Plex Mono',monospace}
.result-card{display:none;margin-top:1rem}
@media(max-width:500px){.metrics{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="page">
  <h1>📈 트레이딩 R/R 계산기</h1>
  <p class="sub">리스크/리워드 분석 + AI 차트 판독</p>

  <div class="card">
    <p class="label">종목 정보</p>
    <div class="grid">
      <div class="field full"><label>종목명</label><input id="name" placeholder="예: 노키아 NOK" /></div>
      <div class="field"><label>현재가 (매수가)</label><input id="entry" type="number" placeholder="7.98" oninput="updateMetrics()" /></div>
      <div class="field"><label>목표가</label><input id="target" type="number" placeholder="8.82" oninput="updateMetrics()" /></div>
      <div class="field"><label>손절가</label><input id="stop" type="number" placeholder="7.64" oninput="updateMetrics()" /></div>
      <div class="field"><label>보유 수량 (선택)</label><input id="qty" type="number" placeholder="100" oninput="updateMetrics()" /></div>
    </div>
  </div>

  <div class="card">
    <p class="label">차트 이미지 (선택)</p>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this.files[0])" />
      <div id="upload-placeholder">
        <div class="upload-icon">📊</div>
        <p class="upload-text">차트 스크린샷을 드래그하거나 클릭해서 올려주세요</p>
        <p class="upload-sub">PNG, JPG 지원</p>
      </div>
      <img id="preview" />
    </div>
    <button class="remove-btn" id="remove-btn" style="display:none" onclick="removeImage()">이미지 제거</button>
  </div>

  <button class="btn" id="analyze-btn" onclick="analyze()">AI 종합 분석하기</button>

  <div class="card result-card" id="result-card">
    <div class="metrics" id="metrics-area"></div>
    <div id="qty-area"></div>
    <div class="bar-wrap">
      <div class="bar-labels"><span>0</span><span>기준선 1:2</span><span>1:3+</span></div>
      <div class="bar-track"><div class="bar-fill" id="bar-fill"></div></div>
    </div>
    <div class="verdict" id="verdict"></div>
    <div id="ai-area"></div>
  </div>
</div>

<script>
const GEMINI_API_KEY = 'AIzaSyB8COzIsPOeABmGeKIc7kgafHeLC9Hp3vs';

let imageBase64 = null;
let imageType = 'image/png';

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  imageType = file.type;
  const reader = new FileReader();
  reader.onload = (e) => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('preview').src = e.target.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('upload-placeholder').style.display = 'none';
    document.getElementById('remove-btn').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function handleDrop(e) {
  e.preventDefault();
  handleFile(e.dataTransfer.files[0]);
}

function removeImage() {
  imageBase64 = null;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('preview').src = '';
  document.getElementById('upload-placeholder').style.display = 'block';
  document.getElementById('remove-btn').style.display = 'none';
  document.getElementById('fileInput').value = '';
}

function getValues() {
  const e = parseFloat(document.getElementById('entry').value);
  const t = parseFloat(document.getElementById('target').value);
  const s = parseFloat(document.getElementById('stop').value);
  const q = parseFloat(document.getElementById('qty').value) || null;
  const valid = e > 0 && t > 0 && s > 0;
  const profitPct = valid ? (t - e) / e * 100 : null;
  const lossPct = valid ? (e - s) / e * 100 : null;
  const rr = valid && lossPct > 0 ? profitPct / lossPct : null;
  return { e, t, s, q, valid, profitPct, lossPct, rr };
}

function updateMetrics() {
  const { e, t, s, q, valid, profitPct, lossPct, rr } = getValues();
  if (!valid) { document.getElementById('result-card').style.display = 'none'; return; }

  document.getElementById('result-card').style.display = 'block';

  const rrColor = rr >= 2 ? '#1D9E75' : rr >= 1 ? '#BA7517' : '#E24B4A';
  const rrLabel = rr >= 2 ? '좋은 설계 ✓' : rr >= 1 ? '아슬아슬 ⚠' : '구조 역전 ✕';
  const barW = Math.min(rr / 3 * 100, 100);

  document.getElementById('metrics-area').innerHTML = `
    <div class="metric"><div class="metric-label">목표 수익률</div><div class="metric-value" style="color:#1D9E75">+${profitPct.toFixed(1)}%</div></div>
    <div class="metric"><div class="metric-label">손절 손실률</div><div class="metric-value" style="color:#E24B4A">-${lossPct.toFixed(1)}%</div></div>
    <div class="metric"><div class="metric-label">R/R 비율</div><div class="metric-value">1:${rr.toFixed(2)}</div></div>
    <div class="metric"><div class="metric-label">판정</div><div style="margin-top:4px"><span class="tag" style="background:${rrColor}22;color:${rrColor};border:0.5px solid ${rrColor}44">${rrLabel}</span></div></div>
  `;

  if (q) {
    document.getElementById('qty-area').innerHTML = `
      <div class="metrics">
        <div class="metric" style="grid-column:1/3"><div class="metric-label">예상 수익 (${q}주)</div><div class="metric-value" style="color:#1D9E75">+${((t-e)*q).toLocaleString('ko-KR',{maximumFractionDigits:0})}</div></div>
        <div class="metric" style="grid-column:3/5"><div class="metric-label">최대 손실 (${q}주)</div><div class="metric-value" style="color:#E24B4A">-${((e-s)*q).toLocaleString('ko-KR',{maximumFractionDigits:0})}</div></div>
      </div>`;
  } else {
    document.getElementById('qty-area').innerHTML = '';
  }

  document.getElementById('bar-fill').style.width = barW + '%';
  document.getElementById('bar-fill').style.background = rrColor;

  const name = document.getElementById('name').value.trim();
  const msg = rr >= 2
    ? `R/R ${rr.toFixed(2)} — 손절 ${lossPct.toFixed(1)}%로 목표 ${profitPct.toFixed(1)}%를 노리는 구조. 추세가 확인된 종목이라면 진입 고려해볼 만해요.`
    : rr >= 1
    ? `R/R ${rr.toFixed(2)} — 최소 기준(1:2)에 못 미쳐요. 손절을 더 좁히거나 목표가를 올리세요.`
    : `R/R ${rr.toFixed(2)} — ${profitPct.toFixed(1)}% 벌려고 ${lossPct.toFixed(1)}%를 거는 구조. 진입 전에 숫자를 다시 설계하세요.`;

  document.getElementById('verdict').style.background = rrColor + '12';
  document.getElementById('verdict').style.borderColor = rrColor + '33';
  document.getElementById('verdict').innerHTML = `
    <div class="verdict-header">
      <div class="verdict-dot" style="background:${rrColor}"></div>
      <span class="verdict-title">${name ? name + ' — ' : ''}${rrLabel}</span>
    </div>
    <p class="verdict-body">${msg}</p>
  `;
}

async function analyze() {
  const { e, t, s, q, valid, profitPct, lossPct, rr } = getValues();
  if (!valid) { alert('현재가, 목표가, 손절가를 입력해주세요'); return; }

  updateMetrics();

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  btn.textContent = 'AI 분석 중...';

  document.getElementById('ai-area').innerHTML = `
    <div class="ai-box">
      <div class="ai-header"><span class="ai-badge">AI</span><span class="ai-title">차트 분석 중</span></div>
      <div class="ai-body"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    </div>`;

  const name = document.getElementById('name').value.trim();
  const prompt = `당신은 주식 트레이딩 분석 전문가입니다.
종목: ${name || '미입력'}
매수가: ${e}, 목표가: ${t} (+${profitPct.toFixed(1)}%), 손절가: ${s} (-${lossPct.toFixed(1)}%), R/R: 1:${rr.toFixed(2)}
${q ? `수량: ${q}주` : ''}
${imageBase64 ? '첨부된 차트 이미지를 분석해서:' : '수치 기반으로:'}
1. RSI 수치와 과열/침체 여부
2. 이동평균선 정배열/역배열 상태
3. 현재 추세 상태
4. 진입 타이밍 평가
5. 종합 한 줄 조언

JSON만 반환하세요. 백틱이나 다른 텍스트 없이 순수 JSON만:
{"rsi":"숫자 또는 확인불가","rsi_status":"과열/정상/침체/확인불가","trend":"정배열 우상향/횡보/역배열/확인불가","timing":"지금 진입 가능/눌림 대기 권장/진입 불가","timing_reason":"한 문장","advice":"냉철한 한 줄 조언"}`;

  const parts = imageBase64
    ? [{ text: prompt }, { inline_data: { mime_type: imageType, data: imageBase64 } }]
    : [{ text: prompt }];

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts }] })
    });
    const data = await res.json();
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    text = text.replace(/```json/g, '').replace(/```/g, '').trim();
    const match = text.match(/\{[\s\S]*\}/);
    const p = match ? JSON.parse(match[0]) : {};

    const rsiColor = p.rsi_status === '과열' ? '#E24B4A' : p.rsi_status === '침체' ? '#378ADD' : '#1D9E75';
    const trendColor = p.trend?.includes('우상향') ? '#1D9E75' : p.trend?.includes('역배열') ? '#E24B4A' : '#BA7517';
    const timingColor = p.timing === '지금 진입 가능' ? '#1D9E75' : p.timing === '진입 불가' ? '#E24B4A' : '#BA7517';

    document.getElementById('ai-area').innerHTML = `
      <div class="ai-box">
        <div class="ai-header"><span class="ai-badge">AI</span><span class="ai-title">차트 종합 분석</span></div>
        <div class="ai-body">
          <div class="ai-row"><span class="ai-row-label">RSI</span><span class="ai-row-val"><span style="color:${rsiColor};font-weight:500">${p.rsi || '-'}</span>${p.rsi_status ? ' — ' + p.rsi_status : ''}</span></div>
          <div class="ai-row"><span class="ai-row-label">추세</span><span class="ai-row-val" style="color:${trendColor}">${p.trend || '-'}</span></div>
          <div class="ai-row"><span class="ai-row-label">타이밍</span><span class="ai-row-val"><span style="color:${timingColor};font-weight:500">${p.timing || '-'}</span>${p.timing_reason ? ' — ' + p.timing_reason : ''}</span></div>
          ${p.advice ? `<div class="ai-advice">${p.advice}</div>` : ''}
        </div>
      </div>`;
  } catch(err) {
    document.getElementById('ai-area').innerHTML = `<p class="error-msg">⚠ 분석 중 오류가 발생했어요. 다시 시도해주세요.</p>`;
  }

  btn.disabled = false;
  btn.textContent = 'AI 종합 분석하기';
}
</script>
</body>
</html>
